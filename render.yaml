services:
  - type: web
    name: upis-lounge-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi --chdir backend
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://upis-lounge.netlify.app,http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: upis-bar-db
          property: connectionString

  - type: web
    name: upis-lounge-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://upis-lounge-backend.onrender.com/api

databases:
  - name: upis-bar-db
    databaseName: upis_bar_db
    region: frankfurt
    plan: free
